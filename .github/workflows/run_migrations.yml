name: Run Rails migrations

on:
  workflow_dispatch:

jobs:
  migrate:
    runs-on: ubuntu-latest
    env:
      RAILS_ENV: production
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
      ASTRO_API_KEY: ${{ secrets.ASTRO_API_KEY }}
      SENDGRID_API_KEY: ${{ secrets.SENDGRID_API_KEY }}
      SMTP_ADDRESS: ${{ secrets.SMTP_ADDRESS }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_DOMAIN: ${{ secrets.SMTP_DOMAIN }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_AUTHENTICATION: ${{ secrets.SMTP_AUTHENTICATION }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          cache-bundler: true

      - name: Cache gems
        uses: actions/cache@v4
        with:
          path: vendor/bundle
          key: ${{ runner.os }}-gems-${{ hashFiles('**/Gemfile.lock') }}
          restore-keys: |
            ${{ runner.os }}-gems-

      - name: Install dependencies
        run: |
          gem install bundler --no-document
          bundle config set --local path 'vendor/bundle'
          bundle install --jobs 4 --retry 3

      - name: Run database migrations
        run: bundle exec rails db:migrate --trace

      # Optional: run seeds or a one-off job by uncommenting below
      # - name: Run seeds
      #   run: bundle exec rails db:seed
      #   env:
      #     RAILS_ENV: production
