name: Lunar phase email (manual only)

# Scheduling moved to AWS (EventBridge Scheduler -> ECS Fargate -> SES).
# See infra/ for the production cron. This workflow is kept only for manual,
# on-demand runs (e.g. testing); it no longer runs on a schedule.
on:
  workflow_dispatch:

jobs:
  lunar_email:
    runs-on: ubuntu-latest
    env:
      RAILS_ENV: production
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
      # Force SMTP here so a manual GH run does not require AWS credentials.
      MAIL_DELIVERY_METHOD: smtp
      SMTP_ADDRESS: ${{ secrets.SMTP_ADDRESS }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_DOMAIN: ${{ secrets.SMTP_DOMAIN }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_AUTHENTICATION: ${{ secrets.SMTP_AUTHENTICATION }}
      APP_HOST: ${{ secrets.APP_HOST }}
      DAILY_LUNAR_API_URL: ${{ secrets.DAILY_LUNAR_API_URL }}
      ASTRO_API_KEY: ${{ secrets.ASTRO_API_KEY }}
      REDIS_URL: ${{ secrets.REDIS_URL }}
      DELIVERY_TIME_ZONE: Europe/Stockholm

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libpq-dev build-essential

      - name: Install gems
        run: |
          bundle config set without 'development test' || true
          bundle install --jobs 4 --retry 3

      - name: Run DB migrations
        run: bundle exec rails db:migrate

      - name: Run lunar phase email
        run: bundle exec rails cron:lunar_phase_email
