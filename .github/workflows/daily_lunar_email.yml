name: Daily lunar email (Neon)

on:
  schedule:
    - cron: "30 19,20 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: 'Force run regardless of Stockholm local time ("true" to force)'
        required: false
        default: "false"

jobs:
  gate:
    runs-on: ubuntu-latest
    outputs:
      run: ${{ steps.check_time.outputs.run }}
    steps:
      - name: Check local time (Europe/Stockholm)
        id: check_time
        run: |
          echo "Europe/Stockholm now: $(TZ='Europe/Stockholm' date)"
          now=$(TZ='Europe/Stockholm' date +%s)
          target=$(TZ='Europe/Stockholm' date -d "$(TZ='Europe/Stockholm' date +%F) 21:30:00" +%s)
          diff=$(( now>target ? now-target : target-now ))
          echo "Diff from 21:30: ${diff}s"
          if [ "$diff" -le 900 ]; then
            echo "run=true" >> $GITHUB_OUTPUT
          else
            echo "run=false" >> $GITHUB_OUTPUT
            echo "Not within 15 min of 21:30 Stockholm - skipping."
          fi

  daily_email:
    needs: gate
    if: needs.gate.outputs.run == 'true' || github.event.inputs.force == 'true'
    runs-on: ubuntu-latest
    env:
      RAILS_ENV: production
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      RAILS_MASTER_KEY: ${{ secrets.RAILS_MASTER_KEY }}
      SMTP_ADDRESS: ${{ secrets.SMTP_ADDRESS }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_DOMAIN: ${{ secrets.SMTP_DOMAIN }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SMTP_AUTHENTICATION: ${{ secrets.SMTP_AUTHENTICATION }}
      APP_HOST: ${{ secrets.APP_HOST }}
      DAILY_LUNAR_API_URL: ${{ secrets.DAILY_LUNAR_API_URL }}
      ASTRO_API_KEY: ${{ secrets.ASTRO_API_KEY }}
      REDIS_URL: ${{ secrets.REDIS_URL }}

    steps:
      - uses: actions/checkout@v4

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
          bundler-cache: true

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libpq-dev build-essential

      - name: Install gems
        run: |
          bundle config set without 'development test' || true
          bundle install --jobs 4 --retry 3

      - name: Run DB migrations
        run: bundle exec rails db:migrate

      - name: Send daily lunar email
        run: bundle exec rails cron:daily_lunar_email
